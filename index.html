<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Order BASIC v1</title><link rel="manifest" href="./manifest.json">
<style>
*{box-sizing:border-box}body{margin:0;padding:12px 12px 90px;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",Arial,sans-serif;background:#fff;color:#111}h1{font-size:24px;margin:8px 0}.card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}.row{display:flex;gap:8px;margin:8px 0}input,select,button,textarea{font-size:16px;border:1px solid #bbb;border-radius:8px;padding:12px;background:#fff}input,select,textarea{width:100%}button{font-weight:700;touch-action:manipulation}button.primary{background:#111;color:#fff;border-color:#111}button.green{background:#0a7f3f;color:#fff;border-color:#0a7f3f}button.red{background:#c62828;color:#fff;border-color:#c62828}button.orange{background:#f59e0b;color:#111;border-color:#f59e0b}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0}.tabs button{padding:10px 2px;font-size:14px}.tabs button.on{background:#111;color:#fff}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.stat{border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center}.stat b{display:block;font-size:24px;margin-top:6px}.list{border-top:1px solid #ddd;margin-top:8px}.item{display:grid;grid-template-columns:1fr 45px 45px 104px;gap:6px;align-items:center;border-bottom:1px solid #eee;padding:10px 0}.name{font-size:18px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.small{font-size:12px;color:#666}.num{text-align:center;font-weight:800}.actions{display:flex;gap:4px;flex-wrap:wrap}.actions button{font-size:12px;padding:8px 5px}.bottom{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #ddd;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:1000}.bottom button{font-size:15px;padding:12px 4px}.screen{display:none}.screen.on{display:block}.msg{background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:10px;margin:8px 0}
</style></head><body>
<h1>мЈјл¬ём¶ңкі  BASIC</h1>
<div class="stats"><div class="stat">мЈјл¬ё<b id="totalOrder">0</b></div><div class="stat">м¶ңкі <b id="totalShip">0</b></div><div class="stat">лҜём¶ң<b id="totalRemain">0</b></div></div>
<div class="tabs" id="storeTabs"></div>
<div class="card"><input id="search" placeholder="н’ҲлӘ© кІҖмғү" oninput="render()"></div>
<section id="home" class="screen on"><div class="card"><b id="currentStore">кҙҖнҸү</b><div class="list" id="orderList"></div></div></section>
<section id="add" class="screen"><div class="card"><h2>мЈјл¬ё м¶”к°Җ</h2><select id="addStore"><option>кҙҖнҸү</option><option>мӣ”нҸү</option><option>лҸ„л§Ҳ</option><option>м„ёмў…</option><option>к°Ҳл§Ҳ</option></select><div class="row"><input id="itemName" placeholder="н’ҲлӘ©лӘ…"><input id="itemQty" type="number" inputmode="decimal" placeholder="мҲҳлҹү"></div><button class="primary" style="width:100%" onclick="addOrder()">м¶”к°Җ</button><div id="addMsg"></div></div><div class="card"><h2>м—¬лҹ¬ мӨ„ м¶”к°Җ</h2><select id="bulkStore"><option>кҙҖнҸү</option><option>мӣ”нҸү</option><option>лҸ„л§Ҳ</option><option>м„ёмў…</option><option>к°Ҳл§Ҳ</option></select><textarea id="bulkText" style="height:140px" placeholder="мҳҲ:\nмІӯмғҒм¶” 10\nл§ӣнғҖлҰ¬ 5"></textarea><button class="primary" style="width:100%;margin-top:8px" onclick="bulkAdd()">м—¬лҹ¬ мӨ„ м¶”к°Җ</button><div id="bulkMsg"></div></div></section>
<section id="remain" class="screen"><div class="card"><h2>лҜём¶ң мЎ°нҡҢ</h2><div class="row"><button onclick="remainByStore()">м җнҸ¬лі„</button><button onclick="remainByItem()">н’ҲлӘ©лі„</button></div><div id="remainBox"></div></div></section>
<section id="setting" class="screen"><div class="card"><h2>м„Өм •</h2><button class="red" style="width:100%" onclick="resetAll()">м „мІҙ мҙҲкё°нҷ”</button><button style="width:100%;margin-top:8px" onclick="backup()">л°ұм—… лӢӨмҡҙлЎңл“ң</button><div id="setMsg"></div></div></section>
<nav class="bottom"><button id="navHome" onclick="go('home')">нҷҲ</button><button id="navAdd" onclick="go('add')">м¶”к°Җ</button><button id="navRemain" onclick="go('remain')">лҜём¶ң</button><button id="navSetting" onclick="go('setting')">м„Өм •</button></nav>
<script>
const STORES=["кҙҖнҸү","мӣ”нҸү","лҸ„л§Ҳ","м„ёмў…","к°Ҳл§Ҳ"];
const alias={"л°ұмҳӨмқҙ":"мҳӨмқҙ","мҢҲл°°м¶”":"м•Ңл°°кё°","л№ЁнҢҢ":"нҷҚнҢҢ","мҳӨмқҙм§ҖмҳӨмқҙ":"мҳӨмқҙм§Җ","лҸҢлҜёлӮҳлҰ¬":"лҜёлӮҳлҰ¬","мҲҳмһ…м«‘":"л§ҲлҠҳм«‘","мҲҳмһ…л§ҲлҠҳм«‘":"л§ҲлҠҳм«‘","л¬ө":"мҠӨм№ҳл¬ө","нҢҪмқҙлІ„м„Ҝ":"нҢҪмқҙ","лҠҗнғҖлҰ¬":"мҠӨм№ҳлҠҗнғҖлҰ¬"};
let currentStore=localStorage.getItem("basic_store")||"кҙҖнҸү";
let orders=load();
function $(id){return document.getElementById(id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function norm(name){name=(name||"").trim();return alias[name]||name}
function remain(o){return Math.max(0,Number(o.qty)-Number(o.ship))}
function load(){try{const v=localStorage.getItem("basic_orders");if(v)return JSON.parse(v)}catch(e){}return[]}
function save(){localStorage.setItem("basic_orders",JSON.stringify(orders));localStorage.setItem("basic_store",currentStore);render()}
function render(){renderTabs();renderStats();renderList()}
function renderTabs(){$("storeTabs").innerHTML=STORES.map(s=>'<button class="'+(s===currentStore?'on':'')+'" onclick="setStore(\''+s+'\')">'+s+'</button>').join("");$("currentStore").textContent=currentStore}
function renderStats(){let tq=0,ts=0,tr=0;orders.forEach(o=>{tq+=Number(o.qty);ts+=Number(o.ship);tr+=remain(o)});$("totalOrder").textContent=tq;$("totalShip").textContent=ts;$("totalRemain").textContent=tr}
function renderList(){const q=$("search").value.trim();const arr=orders.filter(o=>o.store===currentStore&&(!q||o.item.includes(q)));if(!arr.length){$("orderList").innerHTML='<div class="msg">мЈјл¬ё м—ҶмқҢ</div>';return}$("orderList").innerHTML=arr.map(o=>{const r=remain(o);return '<div class="item"><div><div class="name">'+o.item+'</div><div class="small">м¶ңкі  '+o.ship+' / мЈјл¬ё '+o.qty+'</div></div><div class="num">'+o.qty+'</div><div class="num">'+r+'</div><div class="actions">'+(r>0?'<button class="green" onclick="shipAll(\''+o.id+'\')">м „мІҙ</button><button class="orange" onclick="shipPart(\''+o.id+'\')">л¶Җл¶„</button>':'<button disabled>мҷ„лЈҢ</button>')+'<button class="red" onclick="delOrder(\''+o.id+'\')">мӮӯм ң</button></div></div>'}).join("")}
function setStore(s){currentStore=s;save()}
function go(id){["home","add","remain","setting"].forEach(x=>$(x).classList.remove("on"));$(id).classList.add("on");["Home","Add","Remain","Setting"].forEach(x=>$("nav"+x).classList.remove("primary"));const m={home:"Home",add:"Add",remain:"Remain",setting:"Setting"};$("nav"+m[id]).classList.add("primary");if(id==="remain")remainByStore()}
function addOrder(){const store=$("addStore").value,item=norm($("itemName").value),qty=Number($("itemQty").value);if(!item||!qty){$("addMsg").innerHTML='<div class="msg">н’ҲлӘ©лӘ…/мҲҳлҹү мһ…л Ҙ</div>';return}const old=orders.find(o=>o.store===store&&o.item===item);if(old)old.qty+=qty;else orders.push({id:uid(),store,item,qty,ship:0});$("itemName").value="";$("itemQty").value="";$("addMsg").innerHTML='<div class="msg">м¶”к°Җ мҷ„лЈҢ</div>';save()}
function parseLine(line,store){line=line.trim();if(!line)return null;const m=line.match(/^(.+?)\s+(\d+(?:\.\d+)?)/);if(!m)return null;return{store,item:norm(m[1]),qty:Number(m[2])}}
function bulkAdd(){const store=$("bulkStore").value;const arr=$("bulkText").value.split(/\n+/).map(l=>parseLine(l,store)).filter(Boolean);if(!arr.length){$("bulkMsg").innerHTML='<div class="msg">м¶”к°Җн•  лӮҙмҡ© м—ҶмқҢ</div>';return}arr.forEach(p=>{const old=orders.find(o=>o.store===p.store&&o.item===p.item);if(old)old.qty+=p.qty;else orders.push({id:uid(),store:p.store,item:p.item,qty:p.qty,ship:0})});$("bulkText").value="";$("bulkMsg").innerHTML='<div class="msg">'+arr.length+'к°ң м¶”к°Җ мҷ„лЈҢ</div>';save()}
function shipAll(id){const o=orders.find(x=>x.id===id);if(!o)return;o.ship=o.qty;save()}
function shipPart(id){const o=orders.find(x=>x.id===id);if(!o)return;const r=remain(o);const raw=prompt(o.item+" л¶Җл¶„м¶ңкі  мҲҳлҹү мһ…л Ҙ\nлӮЁмқҖ мҲҳлҹү: "+r,r);if(raw===null)return;const q=Number(raw);if(!q||q<=0)return;o.ship+=Math.min(q,r);save()}
function delOrder(id){if(!confirm("мӮӯм ң?"))return;orders=orders.filter(o=>o.id!==id);save()}
function remainByStore(){$("remainBox").innerHTML=STORES.map(s=>'<div class="msg">'+s+' '+orders.filter(o=>o.store===s).reduce((a,o)=>a+remain(o),0)+'</div>').join("")}
function remainByItem(){const map={};orders.forEach(o=>{const r=remain(o);if(r>0)map[o.item]=(map[o.item]||0)+r});$("remainBox").innerHTML=Object.keys(map).length?Object.entries(map).map(([k,v])=>'<div class="msg">'+k+' '+v+'</div>').join(""):'<div class="msg">лҜём¶ң м—ҶмқҢ</div>'}
function resetAll(){if(!confirm("м „мІҙ мҙҲкё°нҷ”?"))return;orders=[];save()}
function backup(){const blob=new Blob([JSON.stringify(orders,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="order_basic_backup.json";a.click();URL.revokeObjectURL(a.href)}
render();go("home");
</script></body></html>
