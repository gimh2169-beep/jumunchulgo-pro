<!doctype html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Order Pro Lite v0.2</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#080a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Order Lite">
<style>
:root{--bg:#080a0d;--panel:#11151a;--line:rgba(255,255,255,.1);--text:#f6f7f9;--muted:#9aa1ac;--green:#20d878;--amber:#ffb11b;--red:#ff5967}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;padding:18px 14px calc(104px + env(safe-area-inset-bottom));background:linear-gradient(180deg,#080a0d,#0a0e12 55%,#080a0d);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif}
button,input,select{font-family:inherit}button{touch-action:manipulation;cursor:pointer}button:active{transform:scale(.98)}
.brand{font-size:12px;letter-spacing:4px;font-weight:950;margin-bottom:8px}h1{margin:0;font-size:28px;font-weight:950}.sub{margin-top:8px;color:var(--muted);font-size:13px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);border-radius:18px;overflow:hidden;background:rgba(17,21,26,.75);margin:12px 0}.stat{padding:15px 10px;min-height:88px}.stat:not(:last-child){border-right:1px solid var(--line)}.stat span{display:block;color:#c6ccd5;font-size:12px;font-weight:800}.stat b{display:block;margin-top:20px;font-size:32px;line-height:.9;font-weight:950}.stat:last-child b{color:var(--green)}
.stores{display:flex;gap:18px;overflow:auto;border-bottom:1px solid var(--line);padding:4px 0 0;margin-bottom:14px}.stores button{border:0;background:transparent;color:#aab1bb;font-size:18px;font-weight:900;padding:12px 0 14px;min-width:48px}.stores button.on{color:#fff;border-bottom:2px solid var(--green)}
.search input{width:100%;height:54px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.055);color:#fff;padding:0 16px;font-size:17px;outline:none}.search{margin-bottom:12px}
.screen{display:none}.screen.on{display:block}.head,.row{display:grid;grid-template-columns:minmax(0,1fr) 54px 54px 76px;gap:7px;align-items:center}.head{color:#9fa7b3;font-size:13px;font-weight:850;padding-bottom:12px;border-bottom:1px solid var(--line)}.row{min-height:76px;border-bottom:1px solid var(--line)}
.item{font-size:22px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.num{font-size:20px;font-weight:900}.rem{font-size:20px;font-weight:950;color:var(--amber)}.rem.zero{color:var(--green)}
.ship{height:46px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-weight:950}.ship:before{content:'● ';color:var(--green)}.done{height:46px;border:0;background:transparent;color:#b6bdc7;font-size:14px;font-weight:900}
.card{border:1px solid var(--line);border-radius:18px;background:rgba(17,21,26,.75);padding:16px;margin-top:12px}.card h2{margin:0 0 14px;font-size:22px;font-weight:950}
input,select{width:100%;height:52px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.055);color:#fff;padding:0 14px;font-size:16px;outline:none;margin-bottom:8px}
.btnRow{display:flex;gap:8px;margin-top:10px}.btnRow button{flex:1;height:52px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);color:#fff;font-weight:950;font-size:15px}.btnRow .primary{background:rgba(32,216,120,.16);border-color:rgba(32,216,120,.3);color:#dfffea}.btnRow .danger{background:rgba(255,89,103,.09);border-color:rgba(255,89,103,.26);color:#ffd0d5}
.msg{padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);margin-top:10px;color:#d4dae3;font-weight:700}
.bottom{position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:99999;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px;min-height:84px;border:1px solid rgba(255,255,255,.14);border-radius:25px;background:rgba(16,19,24,.97);box-shadow:0 20px 70px rgba(0,0,0,.48)}
.bottom button{border:0;background:transparent;color:#aeb5c0;min-height:62px;border-radius:18px;font-size:16px;font-weight:950}.bottom button.on{color:var(--green);background:rgba(32,216,120,.12)}
</style></head><body>
<div class="brand">PRO ORDER</div><h1>Order Lite</h1><div class="sub" id="today">LIVE</div>
<section class="stats"><div class="stat"><span>주문</span><b id="stOrder">0</b></div><div class="stat"><span>출고</span><b id="stShip">0</b></div><div class="stat"><span>미출</span><b id="stRemain">0</b></div></section>
<div class="stores" id="stores"></div>
<div class="search"><input id="q" placeholder="품목 검색..." oninput="render()"></div>
<section id="home" class="screen on"><div class="head"><span>품목</span><span>주문</span><span>잔량</span><span></span></div><div id="list"></div></section>
<section id="order" class="screen"><div class="card"><h2>주문 추가</h2><select id="orderStore"><option>관평</option><option>월평</option><option>도마</option><option>세종</option><option>갈마</option></select><input id="itemInput" placeholder="품목명"><input id="qtyInput" type="number" inputmode="numeric" placeholder="수량"><div class="btnRow"><button class="primary" onclick="addOrder()">추가</button><button onclick="sample()">샘플</button><button class="danger" onclick="resetAll()">초기화</button></div><div id="orderMsg"></div></div></section>
<section id="remain" class="screen"><div class="card"><h2>미출고</h2><div class="btnRow"><button onclick="remainByItem()">품목별</button><button onclick="remainByStore()">점포별</button></div><div id="remainBox"></div></div></section>
<nav class="bottom"><button id="bHome" onclick="go('home')">홈</button><button id="bOrder" onclick="go('order')">주문</button><button id="bRemain" onclick="go('remain')">미출</button></nav>
<script>
const STORES=['관평','월평','도마','세종','갈마'];
const alias={'백오이':'오이','쌈배추':'알배기','빨파':'홍파','오이지오이':'오이지','돌미나리':'미나리','수입쫑':'마늘쫑','묵':'스치묵','팽이버섯':'팽이','느타리':'스치느타리'};
let sel=localStorage.getItem('opl_store')||'관평';
let rows=loadRows();
function $(id){return document.getElementById(id)}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function norm(x){return alias[x]||x}
function rem(r){return Math.max(0,Number(r.order||0)-Number(r.ship||0))}
function loadRows(){try{const v=localStorage.getItem('opl_rows');if(v)return JSON.parse(v)}catch(e){}return[{id:uid(),store:'관평',item:'맛타리',order:12,ship:0},{id:uid(),store:'관평',item:'청상추',order:15,ship:0},{id:uid(),store:'관평',item:'양송이',order:9,ship:9}]}
function save(){localStorage.setItem('opl_rows',JSON.stringify(rows));localStorage.setItem('opl_store',sel);render()}
function renderDate(){const d=new Date(),day=['일','월','화','수','목','금','토'][d.getDay()];$('today').textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${day}) · LIVE`}
function renderStores(){$('stores').innerHTML=STORES.map(s=>`<button onclick="setStore('${s}')" class="${s===sel?'on':''}">${s}</button>`).join('')}
function filtered(){const q=$('q').value.trim();return rows.filter(r=>r.store===sel&&(!q||r.item.includes(q)))}
function renderStats(){let o=0,s=0,m=0;rows.forEach(r=>{o+=Number(r.order||0);s+=Number(r.ship||0);m+=rem(r)});$('stOrder').textContent=o;$('stShip').textContent=s;$('stRemain').textContent=m}
function renderList(){const arr=filtered();$('list').innerHTML=arr.length?arr.map(r=>{const left=rem(r);return `<div class="row"><div class="item">${r.item}</div><div class="num">${r.order}</div><div class="rem ${left?'':'zero'}">${left}</div>${left?`<button class="ship" onclick="ship('${r.id}')">출고</button>`:`<button class="done" disabled>완료</button>`}</div>`}).join(''):`<div class="msg">표시할 품목 없음</div>`}
function render(){renderDate();renderStores();renderStats();renderList()}
function setStore(s){sel=s;save()}
function go(id){['home','order','remain'].forEach(x=>$(x).classList.remove('on'));$(id).classList.add('on');['Home','Order','Remain'].forEach(x=>$('b'+x).classList.remove('on'));const map={home:'Home',order:'Order',remain:'Remain'};$('b'+map[id]).classList.add('on');if(id==='remain')remainByItem()}
function ship(id){
  const r=rows.find(x=>x.id===id);
  if(!r)return;
  const left=rem(r);
  if(left<=0)return;
  const raw=prompt(r.item+" 부분출고 수량 입력\n남은 수량: "+left, left);
  if(raw===null)return;
  const qty=Number(raw);
  if(!qty || qty<=0)return;
  r.ship+=Math.min(qty,left);
  save();
}
function addOrder(){const store=$('orderStore').value,item=norm($('itemInput').value.trim()),qty=Number($('qtyInput').value);if(!item||!qty){$('orderMsg').innerHTML='<div class="msg">품목명과 수량을 입력</div>';return}const old=rows.find(r=>r.store===store&&r.item===item);if(old)old.order+=qty;else rows.push({id:uid(),store,item,order:qty,ship:0});$('itemInput').value='';$('qtyInput').value='';$('orderMsg').innerHTML=`<div class="msg">${item} ${qty} 추가 완료</div>`;save()}
function sample(){const store=$('orderStore').value;[['맛타리',12],['청상추',15],['양송이',9]].forEach(([item,qty])=>{const old=rows.find(r=>r.store===store&&r.item===item);if(old)old.order+=qty;else rows.push({id:uid(),store,item,order:qty,ship:0})});$('orderMsg').innerHTML='<div class="msg">샘플 추가 완료</div>';save()}
function resetAll(){if(confirm('전체 초기화?')){rows=[];save()}}
function remainByItem(){const m={};rows.forEach(r=>{const v=rem(r);if(v)m[r.item]=(m[r.item]||0)+v});$('remainBox').innerHTML=Object.keys(m).length?Object.entries(m).map(([k,v])=>`<div class="msg">${k} ${v}</div>`).join(''):'<div class="msg">미출고 없음</div>'}
function remainByStore(){$('remainBox').innerHTML=STORES.map(s=>`<div class="msg">${s} ${rows.filter(r=>r.store===s).reduce((a,r)=>a+rem(r),0)}</div>`).join('')}
setInterval(renderDate,1000);render();go('home');
</script></body></html>
