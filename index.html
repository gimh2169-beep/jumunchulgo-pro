<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>주문출고_PRO_v57</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#07090c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="주문출고 PRO">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --bg:#07090c;--side:#05070a;--panel:#11151a;--line:rgba(255,255,255,.075);
  --line2:rgba(255,255,255,.14);--text:#f6f7f9;--muted:#9aa1ac;--green:#20d878;
  --amber:#ffb11b;--red:#ff5967;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;letter-spacing:-.45px}
body{background:radial-gradient(circle at 55% -8%,rgba(255,255,255,.07),transparent 27%),radial-gradient(circle at 92% 7%,rgba(32,216,120,.055),transparent 23%),linear-gradient(180deg,#07090c 0%,#0a0e12 47%,#07090c 100%)}
button,input,textarea,select{font-family:inherit}
button{touch-action:manipulation;cursor:pointer;user-select:none}
button:active{transform:scale(.98)}
.app{min-height:100vh}
.side{position:fixed;left:0;top:0;bottom:0;width:198px;background:rgba(5,7,10,.94);border-right:1px solid var(--line);padding:42px 30px 28px;display:flex;flex-direction:column;z-index:20}
.logo{font-size:30px;line-height:1.02;letter-spacing:7px;font-weight:950;color:#fff}
.logoSub{margin-top:12px;color:#c7ccd4;font-size:14px;font-weight:650;white-space:nowrap}
.logoSub b{color:var(--green);font-size:12px;margin-left:6px}
.nav{margin-top:44px;display:flex;flex-direction:column;gap:16px}
.nav button{display:flex;align-items:center;gap:14px;width:100%;height:58px;border:0;border-radius:15px;background:transparent;color:#c3c9d2;font-size:16px;font-weight:800;text-align:left;padding:0 16px}
.nav button.on{background:linear-gradient(90deg,rgba(32,216,120,.16),rgba(255,255,255,.035));color:var(--green)}
.navIcon{width:20px;height:20px;border:1.7px solid currentColor;border-radius:5px;display:inline-flex;align-items:center;justify-content:center}
.navIcon:after{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
.sync{margin-top:auto;color:#a8aeb8}
.live{display:flex;align-items:center;gap:8px;color:var(--green);font-size:14px;font-weight:900}
.live:before{content:"";width:8px;height:8px;background:var(--green);border-radius:50%}
.sync p{margin:8px 0 0;font-size:12px;line-height:1.6}
.logout{margin-top:27px;padding-top:27px;border-top:1px solid var(--line);font-size:15px;color:#9ba2ad}
.main{margin-left:198px;padding:54px 26px 42px 41px;max-width:1024px}
.hero{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:34px}
.hero h1{margin:0;font-size:30px;line-height:1.08;font-weight:950;letter-spacing:-1.25px}
.date{margin-top:9px;color:#a8aeb8;font-size:17px;font-weight:600}
.actions{display:flex;gap:18px}.iconBtn{width:34px;height:34px;border:0;background:transparent;color:#c6ccd5;font-size:24px;padding:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden;border:1px solid var(--line);border-radius:18px;background:rgba(17,21,26,.58);box-shadow:inset 0 1px 0 rgba(255,255,255,.025),0 22px 70px rgba(0,0,0,.16);margin-bottom:34px}
.stat{min-height:134px;padding:30px 34px 24px;background:transparent;border:0}
.stat:not(:last-child){border-right:1px solid var(--line)}
.stat span{display:block;color:#c3c8d0;font-size:15px;font-weight:700}
.stat b{display:block;margin-top:27px;color:#fff;font-size:45px;line-height:.9;font-weight:950;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.stat small{display:block;margin-top:15px;color:var(--green);font-size:16px;font-weight:900}.stat:nth-child(4) b{color:var(--green)}
.tabs{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);margin-bottom:23px}
.storeTabs{display:flex;gap:42px;overflow:auto;scrollbar-width:none;padding:0 0 13px}.storeTabs::-webkit-scrollbar{display:none}
.storeTabs button{border:0;background:transparent;color:#a7adb7;padding:0 0 13px;font-size:20px;font-weight:850;min-width:44px}
.storeTabs button.on{color:#fff;border-bottom:2px solid var(--green)}
.filter{color:#a9afb8;font-size:24px;padding-bottom:14px}
.search{margin-bottom:25px}.search input{width:100%;height:64px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.052);color:#fff;padding:0 22px;font-size:17px;outline:none}
.search input::placeholder{color:#69717c}
.tableHead,.rowItem{display:grid;grid-template-columns:minmax(0,1fr) 95px 95px 80px 120px;gap:12px}
.tableHead{padding:0 0 18px;border-bottom:1px solid var(--line);color:#a3aab5;font-size:14px;font-weight:750}
.rowItem{align-items:center;min-height:88px;border-bottom:1px solid var(--line)}
.itemName{font-size:25px;line-height:1.08;font-weight:950;letter-spacing:-1.15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums;color:#f5f6f8}.green{color:var(--green)}.amber{color:var(--amber)}
.shipBtn{justify-self:end;width:88px;height:46px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-weight:900}
.shipBtn span{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-right:7px}
.doneBtn{justify-self:end;width:88px;height:46px;border:0;background:transparent;color:#b5bac4;font-size:15px;font-weight:800}
.footer{display:flex;justify-content:space-between;align-items:center;color:#9fa5af;padding:24px 0 0;font-size:15px}
.pages{display:flex;align-items:center;gap:15px}.pages button{width:46px;height:46px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.045);color:#cbd1db;font-size:20px}.pageNow{color:var(--green);background:rgba(0,0,0,.24);border-radius:10px;padding:14px 17px;font-weight:900}
.panel{display:none;margin-top:18px;border:1px solid var(--line);border-radius:18px;background:rgba(17,21,26,.72);padding:16px}
.panel.on{display:block}.panel h2{margin:0 0 14px;font-size:20px}
input,textarea,select{width:100%;border:1px solid var(--line2);border-radius:14px;background:rgba(255,255,255,.055);color:#fff;padding:14px 15px;font-size:16px;outline:none}
textarea{min-height:140px;line-height:1.5;resize:vertical}
.btnRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btnRow button{flex:1;min-width:88px;min-height:46px;border:1px solid var(--line2);border-radius:14px;background:rgba(255,255,255,.055);color:#fff;font-weight:900}.btnRow .primary{background:rgba(32,216,120,.16);border-color:rgba(32,216,120,.26);color:#dfffea}.btnRow .danger{background:rgba(255,89,103,.08);border-color:rgba(255,89,103,.23);color:#ffd0d5}
.result{margin-top:12px;color:#cbd1db;font-size:14px}.msg{padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.04);margin-top:10px;color:#cbd1db}
.mobileNav{display:none}
@media(max-width:700px){
  body{padding-bottom:92px}.side{display:none}.main{margin-left:0;padding:22px 14px 24px;max-width:none}.hero{margin-bottom:22px}.hero h1{font-size:25px}.date{font-size:14px}.actions{display:none}
  .stats{grid-template-columns:repeat(2,1fr);margin-bottom:22px}.stat{min-height:106px;padding:18px 16px}.stat:nth-child(2){border-right:0}.stat:nth-child(1),.stat:nth-child(2){border-bottom:1px solid var(--line)}.stat b{font-size:36px;margin-top:22px}
  .storeTabs{gap:28px}.storeTabs button{font-size:18px}.search input{height:58px}
  .tableHead,.rowItem{grid-template-columns:minmax(0,1fr) 42px 42px 38px 76px;gap:8px}.tableHead{font-size:13px}.rowItem{min-height:78px}.itemName{font-size:22px}.cell{font-size:20px}.shipBtn,.doneBtn{width:74px;height:44px;font-size:13px}
  .footer{font-size:13px}.pages{gap:8px}.pages button{width:40px;height:40px}
  .mobileNav{position:fixed;left:14px;right:14px;bottom:14px;z-index:80;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:8px;border:1px solid var(--line);border-radius:22px;background:rgba(14,17,21,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
  .mobileNav button{border:0;background:transparent;color:#aab0ba;padding:10px 4px;font-size:12px;font-weight:800}.mobileNav button.on{color:var(--green)}
}
</style>

<style>
/* V57 bottom nav touch fix */
@media(max-width:700px){
  body{
    padding-bottom:calc(122px + env(safe-area-inset-bottom)) !important;
  }
  .main{
    padding-bottom:calc(34px + env(safe-area-inset-bottom)) !important;
  }
  .mobileNav{
    position:fixed !important;
    left:12px !important;
    right:12px !important;
    bottom:calc(10px + env(safe-area-inset-bottom)) !important;
    z-index:999999 !important;
    display:grid !important;
    grid-template-columns:repeat(5,1fr) !important;
    gap:4px !important;
    padding:10px !important;
    min-height:86px !important;
    border:1px solid rgba(255,255,255,.13) !important;
    border-radius:26px !important;
    background:rgba(16,19,24,.94) !important;
    backdrop-filter:blur(28px) !important;
    -webkit-backdrop-filter:blur(28px) !important;
    box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05) !important;
    pointer-events:auto !important;
  }
  .mobileNav button{
    position:relative !important;
    z-index:1000000 !important;
    min-height:64px !important;
    border:0 !important;
    border-radius:18px !important;
    background:transparent !important;
    color:#aeb5c0 !important;
    padding:8px 2px !important;
    font-size:15px !important;
    line-height:1 !important;
    font-weight:900 !important;
    touch-action:manipulation !important;
    pointer-events:auto !important;
  }
  .mobileNav button.on{
    color:#20d878 !important;
    background:rgba(32,216,120,.11) !important;
  }
  .mobileNav button:active{
    transform:scale(.96) !important;
    background:rgba(255,255,255,.08) !important;
  }
  .rowItem{
    min-height:84px !important;
  }
  .shipBtn,.doneBtn{
    height:48px !important;
    min-height:48px !important;
    font-size:14px !important;
  }
  .storeTabs button{
    min-height:48px !important;
    font-size:19px !important;
  }
  .search input{
    height:62px !important;
    font-size:18px !important;
  }
}
</style>

</head>
<body>
<div class="app">
  <aside class="side">
    <div class="logo">PRO<br>ORDER</div>
    <div class="logoSub">주문출고 PRO <b>v57</b></div>
    <nav class="nav">
      <button id="navHome" class="on"><span class="navIcon"></span>홈</button>
      <button id="navOrder"><span class="navIcon"></span>주문</button>
      <button id="navShip"><span class="navIcon"></span>출고</button>
      <button id="navRemain"><span class="navIcon"></span>미출</button>
      <button id="navSettings"><span class="navIcon"></span>설정</button>
    </nav>
    <div class="sync"><div class="live">LIVE SYNC</div><p id="liveTime">동기화 준비</p><p>모든 데이터가 동기화됨</p><div class="logout">↪ 로그아웃</div></div>
  </aside>

  <main class="main">
    <section class="hero"><div><h1>오늘도 수고하셨습니다.</h1><div class="date" id="todayText">2026.06.30 (월)</div></div><div class="actions"><button class="iconBtn">♧</button><button class="iconBtn">▣</button></div></section>
    <section class="stats"><div class="stat"><span>전체 행</span><b id="statRows">0</b><small>—</small></div><div class="stat"><span>총 주문 수량</span><b id="statOrder">0</b><small>—</small></div><div class="stat"><span>출고 완료</span><b id="statShip">0</b><small id="shipRate">—</small></div><div class="stat"><span>미출고</span><b id="statRemain">0</b><small>—</small></div></section>
    <section class="tabs"><div class="storeTabs" id="storeTabs"></div><div class="filter">⌘</div></section>
    <section class="search"><input id="searchInput" placeholder="품목 검색..."></section>
    <section id="homePanel"><div class="tableHead"><span>품목명</span><span>주문</span><span>출고</span><span>잔량</span><span></span></div><div id="tableBody"></div><div class="footer"><span id="tableTotal">전체 0건</span><div class="pages"><button type="button">‹</button><span class="pageNow">1</span><span>2</span><span>3</span><span>…</span><span>13</span><button type="button">›</button></div></div></section>
    <section class="panel" id="orderPanel"><h2>주문 등록</h2><select id="storeSelect"><option>관평</option><option>월평</option><option>도마</option><option>세종</option><option>갈마</option></select><textarea id="orderText" placeholder="예:&#10;맛타리 12&#10;청상추 15&#10;양송이 9"></textarea><div class="btnRow"><button class="primary" id="addBtn">등록</button><button id="sampleBtn">샘플</button><button class="danger" id="resetBtn">초기화</button></div><div class="result" id="orderResult"></div></section>
    <section class="panel" id="remainPanel"><h2>미출고</h2><div class="btnRow"><button id="itemRemainBtn">품목별</button><button id="storeRemainBtn">점포별</button><button class="primary" id="shipSearchBtn">검색결과 출고</button></div><div class="result" id="remainResult"></div></section>
    <section class="panel" id="settingsPanel"><h2>설정</h2><div class="btnRow"><button id="backupBtn">백업</button><button id="restoreBtn">자동복구</button><button id="undoBtn">되돌리기</button></div><div class="result" id="settingsResult"></div></section>
  </main>
</div>

<div class="mobileNav"><button id="mHome" class="on">홈</button><button id="mOrder">주문</button><button id="mShip">출고</button><button id="mRemain">미출</button><button id="mSettings">설정</button></div>

<script>
(function(){
"use strict";
const VERSION="v57";
const STORES=["관평","월평","도마","세종","갈마"];
const alias={"백오이":"오이","쌈배추":"알배기","빨파":"홍파","오이지오이":"오이지","돌미나리":"미나리","수입쫑":"마늘쫑","묵":"스치묵","건궁채":"궁채","팽이버섯":"팽이","느타리":"스치느타리"};
const $=id=>document.getElementById(id);
let sel=localStorage.getItem("v57_store")||"관평";
let rows=loadRows();
let hist=loadHist();

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function norm(s){return alias[s]||s}
function rem(r){return Math.max(0,(+r.order||0)-(+r.ship||0))}
function loadHist(){try{return JSON.parse(localStorage.getItem("v57_hist")||"[]")}catch(e){return[]}}
function loadRows(){
  const keys=["v57_rows","v55_rows","v54_rows","v53_rows","v52_rows","v51_rows","v50_rows","v49_rows","v48_rows","v47_rows","v46_rows","v45_rows","v44_rows","v43_rows","v42_rows","v41_rows"];
  for(const k of keys){try{const v=localStorage.getItem(k);if(v){const arr=JSON.parse(v);if(Array.isArray(arr))return arr}}catch(e){}}
  return [
    {id:uid(),store:"관평",item:"맛타리",order:12,ship:10,unit:""},
    {id:uid(),store:"관평",item:"청상추",order:15,ship:15,unit:""},
    {id:uid(),store:"관평",item:"양송이",order:9,ship:9,unit:""},
    {id:uid(),store:"관평",item:"얼갈이",order:8,ship:5,unit:""},
    {id:uid(),store:"관평",item:"적상추",order:6,ship:6,unit:""},
    {id:uid(),store:"관평",item:"깻잎",order:10,ship:9,unit:""},
    {id:uid(),store:"관평",item:"부추",order:7,ship:7,unit:""},
    {id:uid(),store:"관평",item:"단호박",order:4,ship:2,unit:""},
    {id:uid(),store:"관평",item:"오이",order:11,ship:11,unit:""}
  ];
}
function save(){localStorage.setItem("v57_rows",JSON.stringify(rows));localStorage.setItem("v57_hist",JSON.stringify(hist.slice(-200)));localStorage.setItem("v57_store",sel);render()}
function snap(msg){hist.push({t:new Date().toISOString(),msg,rows:JSON.stringify(rows)})}
function renderDate(){const d=new Date(),days=["일","월","화","수","목","금","토"];$("todayText").textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} (${days[d.getDay()]})`;$("liveTime").textContent=d.toLocaleString("ko-KR")}
function renderStats(){const o=rows.reduce((a,r)=>a+(+r.order||0),0),s=rows.reduce((a,r)=>a+(+r.ship||0),0),m=rows.reduce((a,r)=>a+rem(r),0);$("statRows").textContent=rows.length;$("statOrder").textContent=o;$("statShip").textContent=s;$("statRemain").textContent=m;$("shipRate").textContent=o?Math.round(s/o*1000)/10+"%":"—"}
function renderStores(){$("storeTabs").innerHTML=STORES.map(s=>`<button type="button" class="${s===sel?'on':''}" id="store_${s}">${s}</button>`).join("");STORES.forEach(s=>{$("store_"+s).onclick=function(){sel=s;save()}})}
function currentRows(){const q=$("searchInput").value.trim();return rows.filter(r=>r.store===sel&&(!q||r.item.includes(q)))}
function renderTable(){const arr=currentRows();$("tableBody").innerHTML=arr.length?arr.map(r=>{const left=rem(r),done=left<=0;return `<div class="rowItem"><div class="itemName">${r.item}</div><div class="cell">${r.order}</div><div class="cell">${r.ship}</div><div class="cell ${done?'green':'amber'}">${left}</div>${done?`<button type="button" class="doneBtn" disabled>✓ 완료</button>`:`<button type="button" class="shipBtn" id="ship_${r.id}"><span></span>출고</button>`}</div>`}).join(""):`<div class="msg">표시할 품목 없음</div>`;$("tableTotal").textContent=`전체 ${rows.length}건`;arr.forEach(r=>{const b=$("ship_"+r.id);if(b)b.onclick=function(){ship(r.id)}})}
function render(){renderDate();renderStats();renderStores();renderTable()}
function parseLine(line,store){line=line.trim();if(!line)return null;const m=line.match(/^(.+?)\s+(-?\d+(?:\.\d+)?)(.*)$/);if(!m)return null;const item=norm(m[1].trim()),qty=Number(m[2]),unit=(m[3]||"").trim();if(!item||!Number.isFinite(qty))return null;return{id:uid(),store,item,order:qty,ship:0,unit}}
function addOrders(){const store=$("storeSelect").value;const parsed=$("orderText").value.split(/\n+/).map(l=>parseLine(l,store)).filter(Boolean);if(!parsed.length){$("orderResult").innerHTML=`<div class="msg">등록할 품목을 찾지 못함</div>`;return}snap("주문등록");for(const p of parsed){const old=rows.find(r=>r.store===p.store&&r.item===p.item);if(old){old.order+=(+p.order||0);if(p.unit)old.unit=p.unit}else rows.push(p)}$("orderText").value="";$("orderResult").innerHTML=`<div class="msg">${parsed.length}개 품목 등록 완료</div>`;save()}
function ship(id){const r=rows.find(x=>x.id===id);if(!r)return;snap("출고");r.ship=r.order;save()}
function resetAll(){if(!confirm("전체 초기화?"))return;snap("초기화");rows=[];save()}
function showPanel(name){$("orderPanel").classList.toggle("on",name==="order");$("remainPanel").classList.toggle("on",name==="remain");$("settingsPanel").classList.toggle("on",name==="settings");["navHome","navOrder","navShip","navRemain","navSettings","mHome","mOrder","mShip","mRemain","mSettings"].forEach(id=>$(id).classList.remove("on"));if(name==="order"){$("navOrder").classList.add("on");$("mOrder").classList.add("on")}else if(name==="remain"){$("navRemain").classList.add("on");$("mRemain").classList.add("on");itemRemain()}else if(name==="settings"){$("navSettings").classList.add("on");$("mSettings").classList.add("on")}else{$("navHome").classList.add("on");$("mHome").classList.add("on")}}
function itemRemain(){const map={};rows.forEach(r=>{const v=rem(r);if(v>0)map[r.item]=(map[r.item]||0)+v});$("remainResult").innerHTML=Object.keys(map).length?Object.entries(map).map(([k,v])=>`<div class="msg">${k} ${v}</div>`).join(""):`<div class="msg">미출고 없음</div>`}
function storeRemain(){$("remainResult").innerHTML=STORES.map(s=>`<div class="msg">${s} ${rows.filter(r=>r.store===s).reduce((a,r)=>a+rem(r),0)}</div>`).join("")}
function shipSearch(){const arr=currentRows().filter(r=>rem(r)>0);if(!arr.length)return;if(!confirm(`검색 결과 ${arr.length}개 전체출고?`))return;snap("검색결과출고");arr.forEach(r=>r.ship=r.order);save()}
function backup(){const blob=new Blob([JSON.stringify({version:VERSION,rows,hist},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="주문출고_PRO_v57_백업.json";a.click();URL.revokeObjectURL(a.href)}
function undo(){const last=hist.pop();if(!last){$("settingsResult").innerHTML=`<div class="msg">되돌릴 이력 없음</div>`;return}try{rows=JSON.parse(last.rows);save()}catch(e){}}
function init(){
  $("searchInput").oninput=renderTable;
  $("navHome").onclick=()=>showPanel("home");$("navShip").onclick=()=>showPanel("home");$("navOrder").onclick=()=>showPanel("order");$("navRemain").onclick=()=>showPanel("remain");$("navSettings").onclick=()=>showPanel("settings");
  $("mHome").onclick=()=>showPanel("home");$("mShip").onclick=()=>showPanel("home");$("mOrder").onclick=()=>showPanel("order");$("mRemain").onclick=()=>showPanel("remain");$("mSettings").onclick=()=>showPanel("settings");
  $("addBtn").onclick=addOrders;$("sampleBtn").onclick=()=>{$("orderText").value="맛타리 12\n청상추 15\n양송이 9\n얼갈이 8"};$("resetBtn").onclick=resetAll;
  $("itemRemainBtn").onclick=itemRemain;$("storeRemainBtn").onclick=storeRemain;$("shipSearchBtn").onclick=shipSearch;
  $("backupBtn").onclick=backup;$("restoreBtn").onclick=()=>{$("settingsResult").innerHTML=`<div class="msg">자동복구 확인 완료</div>`;render()};$("undoBtn").onclick=undo;
  setInterval(renderDate,1000);render();
}
init();
})();
</script>

<script>
(function(){
  function bindV57Nav(){
    const pairs = [
      ["mHome","home"],["mOrder","order"],["mShip","home"],["mRemain","remain"],["mSettings","settings"],
      ["navHome","home"],["navOrder","order"],["navShip","home"],["navRemain","remain"],["navSettings","settings"]
    ];
    pairs.forEach(([id,panel])=>{
      const el=document.getElementById(id);
      if(el){
        el.onclick=function(ev){
          ev.preventDefault();
          ev.stopPropagation();
          if(typeof showPanel==="function"){ showPanel(panel); }
        };
      }
    });
  }
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded", bindV57Nav);
  }else{
    bindV57Nav();
  }
  setTimeout(bindV57Nav, 300);
})();
</script>
