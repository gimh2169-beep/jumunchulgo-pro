<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>주문출고_PRO_v50</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#080a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="주문출고 PRO">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --bg:#07090c;
  --side:#06070a;
  --panel:#12161b;
  --panel2:#0d1116;
  --line:rgba(255,255,255,.075);
  --line-soft:rgba(255,255,255,.045);
  --text:#f5f7fa;
  --muted:#8f96a3;
  --muted2:#5f6772;
  --green:#20d878;
  --amber:#ffb21c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
  letter-spacing:-.42px;
  background:
    radial-gradient(circle at 55% -10%,rgba(255,255,255,.065),transparent 29%),
    radial-gradient(circle at 95% 6%,rgba(32,216,120,.055),transparent 22%),
    linear-gradient(180deg,#07090c 0%,#0a0d11 46%,#07090c 100%);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px),
    linear-gradient(rgba(255,255,255,.01) 1px,transparent 1px);
  background-size:60px 60px;
  opacity:.16;
  mask-image:linear-gradient(to bottom,black,transparent 82%);
}
.app{min-height:100vh}
.sidebar{
  position:fixed;
  left:0;top:0;bottom:0;
  width:198px;
  z-index:60;
  padding:42px 30px 29px;
  background:rgba(6,7,10,.94);
  border-right:1px solid var(--line);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  display:flex;
  flex-direction:column;
}
.logo{
  font-size:30px;
  line-height:1.02;
  letter-spacing:7px;
  font-weight:950;
  color:#fff;
}
.logoSub{
  margin-top:13px;
  color:#c6cad2;
  font-size:14px;
  font-weight:650;
  white-space:nowrap;
}
.logoSub b{
  color:var(--green);
  font-size:12px;
  margin-left:7px;
}
.nav{
  margin-top:43px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.nav button{
  width:100%;
  display:flex;
  align-items:center;
  gap:14px;
  padding:15px 17px;
  border:0;
  border-radius:14px;
  background:transparent;
  color:#c3c8d1;
  font-size:16px;
  font-weight:800;
  text-align:left;
}
.nav button.on{
  color:var(--green);
  background:linear-gradient(90deg,rgba(32,216,120,.16),rgba(255,255,255,.035));
}
.navIcon{
  width:20px;height:20px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1.7px solid currentColor;
  border-radius:5px;
  opacity:.95;
}
.navIcon:after{
  content:"";
  width:5px;height:5px;
  border-radius:50%;
  background:currentColor;
}
.sideStatus{
  margin-top:auto;
}
.live{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--green);
  font-size:14px;
  font-weight:900;
}
.live:before{
  content:"";
  width:8px;height:8px;
  background:var(--green);
  border-radius:50%;
}
.sideStatus p{
  margin:9px 0 0;
  color:#a8aeb8;
  font-size:12px;
  line-height:1.6;
}
.logout{
  margin-top:27px;
  padding-top:27px;
  border-top:1px solid var(--line);
  color:#9ba2ad;
  font-size:15px;
  font-weight:700;
}
.main{
  margin-left:198px;
  padding:51px 26px 42px 42px;
  max-width:1080px;
}
.hero{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:34px;
}
.hero h1{
  margin:0;
  font-size:30px;
  line-height:1.08;
  font-weight:950;
  letter-spacing:-1.25px;
}
.date{
  margin-top:9px;
  color:#a8aeb8;
  font-size:17px;
  font-weight:600;
}
.topActions{
  display:flex;
  gap:17px;
  padding-top:2px;
}
.iconBtn{
  width:34px;height:34px;
  border:0;
  background:transparent;
  color:#c5cbd4;
  font-size:24px;
  position:relative;
  padding:0;
}
.iconBtn.badge:after{
  content:"25";
  position:absolute;
  right:-8px;top:-8px;
  font-size:10px;
  line-height:1;
  color:#fff;
  background:var(--green);
  border-radius:999px;
  padding:4px 6px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:18px;
  background:rgba(17,21,26,.58);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.026), 0 24px 70px rgba(0,0,0,.18);
  margin-bottom:34px;
}
.stat{
  min-height:134px;
  padding:30px 35px 24px;
  border:0;
  border-radius:0;
  background:transparent;
  box-shadow:none;
}
.stat:not(:last-child){border-right:1px solid var(--line)}
.stat span{
  display:block;
  color:#c3c7cf;
  font-size:15px;
  font-weight:700;
}
.stat b{
  display:block;
  margin-top:27px;
  color:#fff;
  font-size:45px;
  line-height:.9;
  font-weight:950;
  letter-spacing:-2.1px;
  font-variant-numeric:tabular-nums;
}
.stat small{
  display:block;
  margin-top:15px;
  color:var(--green);
  font-size:16px;
  font-weight:900;
}
.stat:nth-child(4) b{color:var(--green)}
.tabs{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
  margin-bottom:25px;
}
.board{
  display:flex;
  gap:42px;
  overflow:auto;
  padding:0 0 14px;
  scrollbar-width:none;
}
.board::-webkit-scrollbar{display:none}
.storeTab{
  border:0;
  background:transparent;
  color:#a8aeb8;
  padding:0 0 13px;
  font-size:20px;
  font-weight:850;
}
.storeTab.on{
  color:#fff;
  border-bottom:2px solid var(--green);
}
.filterIcon{
  color:#a9afb8;
  font-size:24px;
  padding-bottom:14px;
  opacity:.9;
}
.searchLine{
  margin-bottom:25px;
}
.searchLine input{
  width:100%;
  height:63px;
  border:1px solid var(--line);
  border-radius:13px;
  background:rgba(255,255,255,.052);
  color:#fff;
  padding:0 23px;
  font-size:17px;
  outline:none;
}
.searchLine input::placeholder{color:#69717c}
.searchLine input:focus{
  border-color:rgba(32,216,120,.42);
  box-shadow:0 0 0 4px rgba(32,216,120,.07);
}
.tableHead{
  display:grid;
  grid-template-columns:minmax(0,1fr) 92px 92px 80px 120px;
  gap:12px;
  padding:0 0 18px;
  border-bottom:1px solid var(--line);
  color:#a3aab5;
  font-size:14px;
  font-weight:750;
}
.listrow{
  display:grid;
  grid-template-columns:minmax(0,1fr) 92px 92px 80px 120px;
  gap:12px;
  align-items:center;
  min-height:87px;
  padding:18px 0;
  border-bottom:1px solid var(--line);
  background:transparent;
}
.li_name{
  font-size:25px;
  line-height:1.08;
  font-weight:950;
  letter-spacing:-1.15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.li_sub{display:none}
.cell{
  color:#f5f6f8;
  font-size:24px;
  font-weight:900;
  font-variant-numeric:tabular-nums;
}
.cell.green{color:var(--green)}
.cell.amber{color:var(--amber)}
.cell.muted{color:#68717d}
.shipBtn{
  justify-self:end;
  min-width:88px;
  height:46px;
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(255,255,255,.06);
  color:#fff;
  font-size:15px;
  font-weight:900;
}
.shipBtn span{
  display:inline-block;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--green);
  margin-right:7px;
  vertical-align:0;
}
.doneBtn{
  justify-self:end;
  min-width:88px;
  height:46px;
  border:0;
  border-radius:12px;
  background:transparent;
  color:#b5bac4;
  font-size:15px;
  font-weight:800;
}
.doneBtn:disabled{opacity:1}
.tableFoot{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#9fa5af;
  padding:24px 0 0;
  font-size:15px;
}
.pageBtns{
  display:flex;
  align-items:center;
  gap:15px;
}
.pageBtns button{
  width:46px;height:46px;
  border:1px solid var(--line);
  border-radius:12px;
  background:rgba(255,255,255,.045);
  color:#cbd1db;
  font-size:20px;
}
.pageNum{
  color:var(--green);
  background:rgba(0,0,0,.24);
  border-radius:10px;
  padding:14px 17px;
  font-weight:900;
}
#order,#searchSec,#reportSec,.historyCard{display:none}
.hiddenSection{display:none!important}
button{font-family:inherit}
.msg,.item,.issue,details.issue{
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.04);
  padding:14px;
  margin:10px 0;
}
.hide{display:none}
.emptyLine{
  padding:42px 0;
  color:var(--muted);
  font-size:16px;
  border-bottom:1px solid var(--line);
}
.mobileBar{display:none}
@media(max-width:820px){
  .sidebar{display:none}
  .main{
    margin-left:0;
    padding:26px 16px 96px;
  }
  .hero h1{font-size:25px}
  .date{font-size:14px}
  .topActions{gap:8px}
  .stats{
    grid-template-columns:repeat(2,1fr);
    border-radius:18px;
    margin-bottom:24px;
  }
  .stat{min-height:112px;padding:20px}
  .stat:nth-child(2){border-right:0}
  .stat:nth-child(1),.stat:nth-child(2){border-bottom:1px solid var(--line)}
  .stat b{font-size:37px}
  .board{gap:28px}
  .storeTab{font-size:18px}
  .searchLine input{height:58px}
  .tableHead,.listrow{
    grid-template-columns:minmax(0,1fr) 42px 42px 36px 76px;
    gap:8px;
  }
  .tableHead{font-size:13px}
  .li_name{font-size:22px}
  .cell{font-size:20px}
  .shipBtn,.doneBtn{min-width:74px;height:42px;font-size:13px}
  .tableFoot{font-size:13px}
  .pageBtns{gap:10px}
  .pageBtns button{width:40px;height:40px}
  .mobileBar{
    position:fixed;left:16px;right:16px;bottom:14px;z-index:80;
    display:grid;grid-template-columns:repeat(5,1fr);gap:2px;
    padding:8px;border:1px solid var(--line);border-radius:22px;
    background:rgba(14,17,21,.78);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  }
  .mobileBar button{
    border:0;background:transparent;color:#aab0ba;padding:10px 4px;font-size:12px;font-weight:800;
  }
  .mobileBar button:first-child{color:var(--green)}
}
</style>
<style>
/* V50: force reference-image layout even on iPhone */
@media(max-width:820px){
  body{
    min-width:1024px !important;
    overflow-x:auto !important;
    padding:0 !important;
  }
  .sidebar{
    display:flex !important;
    position:fixed !important;
    left:0 !important;
    top:0 !important;
    bottom:0 !important;

    padding:42px 30px 29px !important;
  }
  .main{
    margin-left:198px !important;

  .hero h1{font-size:30px !important;}
  .date{font-size:17px !important;}
  .stats{
    grid-template-columns:repeat(4,1fr) !important;
    border-radius:18px !important;

  }
  .stat{
    min-height:134px !important;
    padding:30px 35px 24px !important;

  .stat b{font-size:45px !important;margin-top:27px !important;}
  .board{gap:42px !important;}
  .storeTab{font-size:20px !important;}
  .searchLine input{height:63px !important;}
  .tableHead,.listrow{
    grid-template-columns:minmax(0,1fr) 92px 92px 80px 120px !important;

  }
  .tableHead{font-size:14px !important;}
  .li_name{font-size:25px !important;}

  }
  .mobileBar{display:none !important;}

</style>

</head><body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">PRO<br>ORDER</div>
    <div class="logoSub">주문출고 PRO <b>v50</b></div>
    <nav class="nav">
      <button class="on" onclick="go('dash')"><span class="navIcon"></span>홈</button>
      <button onclick="go('order')"><span class="navIcon"></span>주문</button>
      <button onclick="go('dash')"><span class="navIcon"></span>출고</button>
      <button onclick="go('searchSec')"><span class="navIcon"></span>미출</button>
      <button onclick="go('reportSec')"><span class="navIcon"></span>설정</button>
    </nav>
    <div class="sideStatus">
      <div class="live">LIVE SYNC</div>
      <p id="liveTime">00:00:00</p>
      <p>모든 데이터가 동기화됨</p>
      <div class="logout">↪ 로그아웃</div>
    </div>
  </aside>

  <main class="main">
    <section class="hero">
      <div>
        <h1>오늘도 수고하셨습니다.</h1>
        <div class="date" id="todayText">2026.06.30 (월)</div>
      </div>
      <div class="topActions">
        <button class="iconBtn badge">♧</button>
        <button class="iconBtn">▣</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat"><span>전체 행</span><b id="sr">0</b><small>—</small></div>
      <div class="stat"><span>총 주문 수량</span><b id="so">0</b><small>—</small></div>
      <div class="stat"><span>출고 완료</span><b id="ss">0</b><small id="shipRateSub">—</small></div>
      <div class="stat"><span>미출고</span><b id="sm">0</b><small>—</small></div>
    </section>

    <section class="tabs">
      <div id="board" class="board"></div>
      <div class="filterIcon">⌘</div>
    </section>

    <section class="searchLine">
      <input id="searchBox" placeholder="품목 검색..." oninput="searchItems()" onkeydown="if(event.key==='Enter')shipSearch()">
    </section>

    <section id="dash">
      <div id="sum" class="hiddenSection"></div>
      <div class="row hiddenSection"><button onclick="showDone=!showDone;save()">완료표시</button><button onclick="shipStore()">점포출고</button></div>
      <h2 id="stitle" class="hiddenSection"></h2>
      <div class="tableHead"><span>품목명</span><span>주문</span><span>출고</span><span>잔량</span><span></span></div>
      <div id="detail"></div>
      <div class="tableFoot"><span id="tableTotal">전체 0건</span><div class="pageBtns"><button>‹</button><span class="pageNum">1</span><span>2</span><span>3</span><span>…</span><span>13</span><button>›</button></div></div>
    </section>

    <section id="order" class="card">
      <h2>주문</h2>
      <div id="orderPanel">
        <select id="store"><option>세종</option><option>월평</option><option>관평</option><option>도마</option><option>갈마</option></select>
        <textarea id="txt" placeholder="단일 점포 또는 5점포 전체 주문 붙여넣기"></textarea>
        <div class="row"><button class="p" onclick="add()">등록</button><button onclick="preview()">검증</button><button class="bad" onclick="resetAll()">초기화</button></div>
        <div id="prev"></div>
      </div>
    </section>

    <section id="searchSec" class="card">
      <h2>미출</h2>
      <div class="row"><button onclick="itemRemainList()">품목별 미출고</button><button onclick="storeRemainList()">점포별 미출고</button><button class="ok" onclick="shipSearch()">전체출고</button></div>
      <div id="searchOut"></div>
    </section>

    <section id="reportSec" class="card">
      <h2>설정</h2>
      <div class="row"><button class="p" onclick="makeReport()">리포트</button><button onclick="backup()">백업</button><button onclick="restoreAuto()">자동복구</button><button class="w" onclick="undo()">되돌리기</button></div>
      <div id="reportBox"></div>
    </section>

    <section class="card historyCard"><h2>이력</h2><div id="logBox"></div></section>
  </main>

  <div class="mobileBar">
    <button onclick="go('dash')">홈</button>
    <button onclick="go('order')">주문</button>
    <button onclick="go('dash')">출고</button>
    <button onclick="go('searchSec')">미출</button>
    <button onclick="go('reportSec')">설정</button>
  </div>
</div>
<script>
const STORES=["세종","월평","관평","도마","갈마"];
const CATEGORY_ORDER=[
 {name:"옆채류",items:["알배기","얼갈이","열무","상추","깻잎","치커리","청경채","미나리","참나물","근대","아욱","취나물","비름","케일","적겨자","부추","실파","쪽파","마늘쫑","고춧잎","호박잎","머위","건궁채"]},
 {name:"뿌리채소",items:["무","당근","세척당근","비트","연근","우엉","마늘","벌마늘"]},
 {name:"양채류",items:["양배추","적채","브로콜리","콜리플라워"]},
 {name:"버섯류",items:["새송이","맛타리","스치느타리","표고","팽이","양송이"]},
 {name:"과채류",items:["오이","미니오이","오이지","애호박","풋호박","쥬키니","가지","피망","미니파프리카","홍파","노파"]}
];

const alias={"샤송이":"새송이","새성이":"새송이","샤성이":"새송이","막타리":"맛타리","팽이버섯":"팽이","수입쫑":"마늘쫑","쫑":"마늘쫑","고추잎":"고춧잎","거추잎":"고춧잎","묵":"스치묵","느타리":"스치느타리","세척":"세척당근","쌈배추":"알배기","백오이":"오이","미니":"미니파프리카","취":"취나물","초당":"초당옥수수","미백":"미백찰옥수수","두부":"팩두부","두부3키로":"두부3kg","빨파":"홍파","궁채":"건궁채","오이지오이":"오이지","흑찰":"흙찰옥수수"};

function compact(s){return String(s||"").trim().replace(/\s+/g,"").replace(/[()]/g,"")}
function norm(s){let x=compact(s).replace(/^행사/,"").replace(/상$/,"");return alias[x]||x}
function unit(s){if(/박스|스티/.test(s))return"박스";if(/단/.test(s))return"단";if(/망/.test(s))return"망";if(/키로|kg/i.test(s))return"kg";return""}

function splitBlocks(text){let cur=document.getElementById("store").value, blocks=[], lines=[];text.split(/\n/).forEach(line=>{let t=compact(line);if(STORES.includes(t)){if(lines.length)blocks.push({store:cur,lines});cur=t;lines=[]}else lines.push(line)});if(lines.length)blocks.push({store:cur,lines});return blocks}
function parseLine(line,store){
 let raw=line.trim();
 if(!raw)return null;
 if(/패스|시세보고/.test(raw))return null;
 let x=raw.replace(/주문|늙은거주지마세요/g,"").replace(/[.:：\-]/g," ");
 let m=x.match(/^(.+?)\s*([0-9]+)\s*(박스|단|망|키로|kg|스티)?/i);
 if(!m){
  let original=compact(raw);
  let item=norm(raw);
  return{
   id:Date.now()+"_"+Math.random().toString(36).slice(2),
   store:store,
   item:item,
   original:original,
   order:0,
   ship:0,
   unit:"",
   corrected:false,
   needCheck:true,
   note:raw
  };
 }
 let original=compact(m[1]), item=norm(m[1]);
 return{
  id:Date.now()+"_"+Math.random().toString(36).slice(2),
  store:store,
  item:item,
  original:original,
  order:+m[2],
  ship:0,
  unit:m[3]||unit(raw),
  corrected:original!==item,
  needCheck:false,
  note:raw
 };
}
function parseAll(){let ok=[],err=[];splitBlocks(document.getElementById("txt").value).forEach(b=>b.lines.forEach(l=>{let r=parseLine(l,b.store);if(!r)return;ok.push(r)}));return{ok,err,stores:[...new Set(ok.map(x=>x.store))]}}
function dups(a){let m={};a.forEach(r=>{let k=r.store+"|"+r.item+"|"+r.unit;m[k]=(m[k]||0)+1});return Object.entries(m).filter(x=>x[1]>1).map(x=>{let p=x[0].split("|");return{store:p[0],item:p[1],count:x[1]}})}

function ship(id,q){

 hist.push({type:"출고",time:now(),changes:[{id,qty:take,store:r.store,item:r.item,unit:r.unit||""}]});
 save();
}

function filterByQuery(q){

  let it=compact(r.item), org=compact(r.original||""), note=compact(r.note||"");
  return (it.includes(nq)||nq.includes(it)||org.includes(raw)||note.includes(raw))&&(showDone||rem(r)>0||r.needCheck);
 });
}

window.APP_VERSION="v50-fixed-dashboard-nosw";
if ("serviceWorker" in navigator) {

    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){ reg.unregister(); });
    }).catch(function(){});
    if (window.caches) {
      caches.keys().then(function(keys){

<script>
(function(){
  const getDateLabel = () => {
    const d = new Date();
    const days = ["일","월","화","수","목","금","토"];
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} (${days[d.getDay()]})`;
  };

  window.updateChrome = function(){
    const today = document.getElementById("todayText");
    if(today) today.textContent = getDateLabel();
    const live = document.getElementById("liveTime");
    if(live) live.textContent = new Date().toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const o=rows.reduce((a,r)=>a+r.order,0), s=rows.reduce((a,r)=>a+r.ship,0);
    const sub=document.getElementById("shipRateSub");
    if(sub) sub.textContent = o ? (Math.round(s/o*1000)/10)+"%" : "—";
    const total=document.getElementById("tableTotal");
    if(total) total.textContent = `전체 ${rows.length}건`;
  };

  window.render = function(){
    stats();
    drawBoard();
    drawDetail();
    drawLogs();
    makeReport(false);
    updateChrome();
  };

  window.drawBoard = function(){
    const board = document.getElementById("board");
    if(!board) return;
    board.innerHTML = STORES.map(st => `<button class="storeTab ${sel===st?'on':''}" onclick="sel='${st}';save()">${st}</button>`).join("");
  };

  window.drawDetail = function(){
    const detail = document.getElementById("detail");
    if(!detail) return;
    const arr=rows.filter(r=>r.store==sel&&(showDone||rem(r)>0));
    detail.innerHTML = renderRows(arr,true);
    updateChrome();
  };

  window.renderRows = function(a,btn){
    if(!a.length) return `<div class="emptyLine">표시할 품목 없음</div>`;
    return a.map(r=>{
      const remain=rem(r);
      if(r.needCheck){
        return `<div class="listrow check">
          <div class="product"><div class="li_name">${r.item}</div><div class="li_sub">${r.store} · 확인필요 · ${r.note}</div></div>
          <div class="cell muted">-</div>
          <div class="cell muted">-</div>
          <div class="cell amber">확인</div>
          <button class="shipBtn act" data-act="edit" data-id="${r.id}"><span></span>수정</button>
        </div>`;
      }
      const done=remain<=0;
      return `<div class="listrow ${done?'complete':''}">
        <div class="product"><div class="li_name">${r.item}</div><div class="li_sub">${r.store}</div></div>
        <div class="cell">${r.order}</div>
        <div class="cell">${r.ship}</div>
        <div class="cell ${done?'green':'amber'}">${remain}</div>
        ${done?`<button class="doneBtn" disabled>✓ 완료</button>`:`<button class="shipBtn act" data-act="all" data-id="${r.id}"><span></span>출고</button>`}
      </div>`;
    }).join("");
  };

  setInterval(()=>{try{updateChrome()}catch(e){}}, 1000);
})();
</script>

</body></html>
